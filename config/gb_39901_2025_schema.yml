entity_definitions:
  Standard:
    description: 国家标准、推荐性标准或 ISO 标准；GB 39901-2025 与其规范性引用使用同一类型。
    identity: normalized_standard_id
    required_properties: [canonical_id, name, standard_id]
    optional_properties: [title_zh, title_en, publication_date, effective_date, reference_is_dated]
  Clause:
    description: 可精确引用的章、条或规范性附录条款，是证据追溯的结构节点。
    identity: standard_id + clause_id
    required_properties: [canonical_id, name, clause_id, source_file]
    optional_properties: [title, parent_clause_id, normative, source_line_start, source_line_end]
  Term:
    description: 第3章定义或引用标准界定的领域术语。
    identity: standard_id + canonical_name
    required_properties: [canonical_id, name, definition]
    optional_properties: [english_name, abbreviation, source_clause, source_standard]
  Organization:
    description: 标准发布、提出、归口、制造、检验检测等责任主体。
    identity: canonical_name
    required_properties: [canonical_id, name]
    optional_properties: [role]
  VehicleCategory:
    description: 法规适用的车辆类别或进一步限定的车辆群体。
    identity: category_code + subtype
    required_properties: [canonical_id, name, category_code]
    optional_properties: [subtype, approval_status]
  System:
    description: 自动紧急制动系统 AEBS 及法规明确涉及的外部车辆系统。
    identity: canonical_name
    required_properties: [canonical_id, name]
    optional_properties: [abbreviation, manufacturer, model, software_version]
  SystemFunction:
    description: AEBS 的可验证功能，如碰撞预警、紧急制动、自检和初始化。
    identity: system + function_code
    required_properties: [canonical_id, name, function_code]
    optional_properties: [description, operating_speed_range]
  SystemState:
    description: 激活、待机、不可用、初始化中、关闭或部分关闭等运行状态。
    identity: system + state_code
    required_properties: [canonical_id, name, state_code]
    optional_properties: [definition]
  SystemComponent:
    description: 传感器、控制器、执行器、电源模块、接口、传输链等系统要素。
    identity: system + component_kind + canonical_name
    required_properties: [canonical_id, name, component_kind]
    optional_properties: [model, manufacturer, hardware_id, software_version]
  Signal:
    description: 碰撞预警、故障、关闭或状态提示使用的光学、声学、触觉或文字信号。
    identity: signal_purpose + modality + appearance
    required_properties: [canonical_id, name, purpose, modality]
    optional_properties: [color, behavior, duration, distinguishability]
  DriverAction:
    description: 驾驶员关闭、开启或中断系统功能的有目的操作。
    identity: action_code
    required_properties: [canonical_id, name, action_code]
    optional_properties: [precondition, effect]
  Requirement:
    description: 一般、性能、鲁棒性、误响应、功能安全、文档或仿真合规要求。
    identity: source_clause + requirement_code
    required_properties: [canonical_id, name, requirement_category, modality]
    optional_properties: [statement, applicability, source_table, needs_review]
  ImplementationRule:
    description: 第9章按车辆类别、型式批准状态和功能范围规定的实施时间规则。
    identity: source_clause + vehicle_scope + approval_status + feature_scope
    required_properties: [canonical_id, name, approval_status, start_offset_months]
    optional_properties: [vehicle_scope, feature_scope, absolute_start_date]
  TypeEquivalenceCriterion:
    description: 第8章用于判断系统、车辆或功能安全描述是否可视为同一型式的条件。
    identity: source_clause + criterion_group + criterion_name
    required_properties: [canonical_id, name, criterion_group]
    optional_properties: [change_direction, allowed_difference, functional_safety_related]
  TestScenario:
    description: 第6章场地、误响应、部分关闭、故障注入或仿真试验场景。
    identity: standard_id + source_clause
    required_properties: [canonical_id, name, scenario_code, scenario_family]
    optional_properties: [execution_mode, start_event, end_event, collision_definition]
  TestTarget:
    description: 车辆、行人、自行车、踏板式两轮摩托车或铁板等试验对象。
    identity: target_class + target_variant
    required_properties: [canonical_id, name, target_class]
    optional_properties: [target_variant, conformity_standard, motion_state, orientation]
  LoadState:
    description: 行车质量或最大设计总质量等试验车辆载荷状态。
    identity: load_state_code
    required_properties: [canonical_id, name, load_state_code]
    optional_properties: [definition, tolerance]
  Condition:
    description: 系统运行、试验环境、场景几何、速度范围、故障状态或工具链使用边界等条件。
    identity: source_clause + condition_code
    required_properties: [canonical_id, name, condition_category]
    optional_properties: [expression, raw_expression]
  Parameter:
    description: 试验输入或配置量，如车辆速度、目标速度、TTC、距离、横向偏差、温度和照度。
    identity: canonical_parameter_code
    required_properties: [canonical_id, name, parameter_code]
    optional_properties: [quantity_kind, canonical_unit]
  Metric:
    description: 用于评价性能、安全或仿真可信度的观测量或 KPI。
    identity: canonical_metric_code
    required_properties: [canonical_id, name, metric_code]
    optional_properties: [quantity_kind, canonical_unit, calculation]
  Threshold:
    description: 与指标和完整限定条件绑定的数值、区间、比例或定性边界。
    identity: source_clause + metric + operator + value + unit + qualifier_hash
    required_properties: [canonical_id, name, operator, raw_value]
    optional_properties: [value, lower_bound, upper_bound, unit, tolerance_lower, tolerance_upper, qualifiers_json]
  AcceptanceCriterion:
    description: 单次试验、重复试验、功能安全验证或仿真确认的判定准则。
    identity: source_clause + criterion_code
    required_properties: [canonical_id, name, criterion_code]
    optional_properties: [statement, pass_logic]
  DocumentationArtifact:
    description: 说明书、系统描述、分析总结、详细备查文档、验证计划、试验报告或仿真文件。
    identity: source_clause + artifact_kind + artifact_name
    required_properties: [canonical_id, name, artifact_kind]
    optional_properties: [submission_status, required_contents, traceability_required]
  FailureMode:
    description: 功能异常、部件故障、接口故障或环境影响导致的失效模式。
    identity: affected_element + failure_code
    required_properties: [canonical_id, name, failure_category]
    optional_properties: [affected_element, fault_timing, detectable]
  Hazard:
    description: 附录A中整车层面的潜在危害。
    identity: canonical_hazard_code
    required_properties: [canonical_id, name, hazard_code]
    optional_properties: [description]
  ASILLevel:
    description: 汽车安全完整性等级或质量管理等级。
    identity: asil_code
    required_properties: [canonical_id, name, asil_code]
    optional_properties: [notes]
  SafetyGoal:
    description: 对应整车危害、为降低风险而定义的安全目标。
    identity: source_table_row + normalized_statement
    required_properties: [canonical_id, name, statement]
    optional_properties: [source_table_row]
  SafetyMeasure:
    description: 部分维持、独立备用、进入安全状态、警告驾驶员或外部措施等安全机制。
    identity: source_clause + measure_code
    required_properties: [canonical_id, name, measure_category]
    optional_properties: [statement, external_measure]
  SafetyAnalysis:
    description: HARA、FMEA、FTA、整车层面、系统层面或误响应安全分析。
    identity: analysis_level + analysis_method + source_clause
    required_properties: [canonical_id, name, analysis_level]
    optional_properties: [analysis_method, summary_or_detailed]
  VerificationActivity:
    description: 功能概念、功能安全概念、系统/整车验证确认、故障注入或仿真确认活动。
    identity: source_clause + activity_code
    required_properties: [canonical_id, name, activity_code]
    optional_properties: [level, method, object, purpose, environment]
  SimulationToolchain:
    description: 用于替代部分场地试验且需经过可信度评估、验证和确认的仿真工具链。
    identity: manufacturer + toolchain_id + version
    required_properties: [canonical_id, name]
    optional_properties: [toolchain_id, version, owner, release_status]
  SimulationModel:
    description: 工具链中的车辆动力学、传感器、系统控制、环境、场景或目标模型。
    identity: toolchain + model_kind + model_id + version
    required_properties: [canonical_id, name, model_kind]
    optional_properties: [model_id, version, fidelity_level]
  ValidityDomain:
    description: 工具链或模型的适用范围、参数范围、假设、限制和阈值。
    identity: toolchain_or_model + domain_code
    required_properties: [canonical_id, name, domain_code]
    optional_properties: [scope, assumptions, limitations, parameter_ranges]
  CredibilityCriterion:
    description: 工具链可信度的能力、准确性、正确性、适用性、可用性及相关性要求。
    identity: criterion_code
    required_properties: [canonical_id, name, criterion_code]
    optional_properties: [description, rationale]


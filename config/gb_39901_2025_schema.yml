schema_version: "2.1"
schema_id: gb_39901_2025_aeb
domain: light_duty_vehicle_aeb_regulation
language: zh-CN
title: GB 39901-2025 轻型汽车自动紧急制动系统专用知识图谱 Schema
description: >-
  面向 GB 39901-2025 全文的领域本体与抽取约束，覆盖法规结构、系统功能与状态、
  性能要求、场地与仿真试验、误响应、同一型式判定、分阶段实施、功能安全及证据追溯。
  本文件是定制抽取和后处理的规范，不表示 LightRAG 会自动执行强类型校验。

source_scope:
  standard_id: GB 39901-2025
  title_zh: 轻型汽车自动紧急制动系统技术要求及试验方法
  title_en: Technical requirements and testing methods for advanced emergency braking system of light-duty vehicles
  source_file: GB+39901-2025.pdf_by_PaddleOCR-VL-1.6.md
  publication_date: 2025-12-31
  effective_date: 2028-01-01
  replaces: GB/T 39901-2021
  applicable_vehicle_categories:
    - M1
    - N1
  covered_sections:
    - "1 范围"
    - "2 规范性引用文件"
    - "3 术语和定义"
    - "4 一般要求"
    - "5 性能要求"
    - "6 试验方法"
    - "7 说明书"
    - "8 同一型式判定"
    - "9 标准的实施"
    - "附录A 功能安全要求"
    - "附录B 仿真试验要求"
    - "附录C 系统功能安全描述要求"

design_principles:
  - 条款是法规追溯主轴；所有要求、试验和安全结论都必须能回到条款或表格。
  - 第5章的性能要求与第6章的试验方法分开建模，通过 VERIFIED_BY 连接。
  - 正常碰撞试验与误响应试验分开建模，避免把“应制动”和“不应响应”混为同一语义。
  - 数值必须绑定指标、单位、比较符和适用条件，禁止产生没有上下文的孤立阈值。
  - 表格和图片不是领域实体；表格行转换为带限定条件的 Requirement、Threshold 或 AcceptanceCriterion。
  - 功能安全使用“故障模式—危害—ASIL—安全目标—安全措施—验证活动—接受准则”链路。
  - 仿真试验使用“工具链—模型—有效域—可信度准则—KPI—验证/确认证据”链路。
  - 实体归一化只合并同一概念的别名，不合并不同目标状态、不同载荷状态或不同试验场景。


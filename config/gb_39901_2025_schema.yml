common_entity_properties:
  canonical_id:
    type: string
    required: true
    pattern: "^GB39901-2025::[A-Za-z]+::.+$"
  name:
    type: string
    required: true
  aliases:
    type: list[string]
    required: false
  description:
    type: string
    required: false
  source_file:
    type: string
    required: true
  source_standard:
    type: string
    required: true
    fixed_value: GB 39901-2025
  source_clause:
    type: string
    required: true_except_for_seed_entities
  source_table:
    type: string
    required: false
  evidence_text:
    type: string
    required: true_except_for_seed_entities
  extraction_confidence:
    type: number
    range: [0.0, 1.0]
  needs_review:
    type: boolean
    default: false

common_relation_properties:

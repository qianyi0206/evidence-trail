    type: string
    required: true
    allowed_values_ref: relations_of_interest
  source_clause:
    type: string
    required: true
  source_table:
    type: string
    required: false
  evidence_text:
    type: string
    required: true
  qualifiers_json:
    type: string
    required: false
    description: JSON 字符串；保存车辆类别、载荷、速度、目标状态、执行模式等边限定条件。
  extraction_confidence:
    type: number
    range: [0.0, 1.0]


    c2c_moving: 匀速车辆目标碰撞预警和紧急制动试验
    c2c_braking: 制动车辆目标碰撞预警和紧急制动试验
    child_pedestrian_crossing: 儿童行人目标横穿试验
    bicycle_crossing: 自行车目标横穿试验
    moped_crossing: 踏板式两轮摩托车目标横穿试验
    false_response_lead_vehicle_turning_right: 跟车时前车右转误响应试验
    false_response_adjacent_stationary_vehicles: 相邻车道静止车辆目标误响应试验
    false_response_steel_plate: 车道内铁板误响应试验
    false_response_same_direction_adult_pedestrian: 经过同向成年行人目标误响应试验
    false_response_oncoming_stationary_bicycle: 经过对向静止自行车目标误响应试验
    emergency_braking_with_warning_disabled: 关闭碰撞预警后的紧急制动试验
    collision_warning_with_braking_disabled: 关闭紧急制动后的碰撞预警试验
    functional_safety_fault_injection: 功能安全故障注入验证确认试验
  target_classes:
    - passenger_vehicle_target
    - production_passenger_vehicle
    - child_pedestrian_target
    - adult_pedestrian_target
    - bicycle_target
    - moped_target
    - steel_plate
  execution_modes:
    - proving_ground
    - simulation
    - HIL
    - vehicle_test
    - document_review
  asil_levels:
    - QM
    - A
    - B
    - C
    - D
  safety_analysis_methods:
    - HARA
    - FMEA
    - FTA
    - equivalent_method
  safety_measure_categories:
    - degraded_operation
    - independent_backup
    - safe_state_by_function_shutdown
    - driver_warning
    - external_measure
  simulation_model_kinds:
    - vehicle_dynamics
    - sensor
    - system_control
    - environment
    - scenario
    - target
  simulation_credibility_dimensions:
    capability: 能力及能力不足
    accuracy: 复现场地试验目标数据的准确性
    correctness: 数据和算法的鲁棒性与正确性
    applicability: 有效域内的适用性
    usability: 人员培训经验与管理流程质量
  approval_statuses:
    - new_type_approval
    - existing_type_approval

normalization_rules:
  standard_ids:
    canonical_examples:
      - GB 39901-2025
      - GB/T 39901-2021
      - GB/T 34590
      - GB 34660
      - ISO 19206-2
    rule: 统一空格和连接号；保留 GB 与 GB/T 的性质差异；不为未注明年份的引用擅自补年份。
  aliases:
    AEBS: 自动紧急制动系统
    AEB系统: 自动紧急制动系统
    系统: 自动紧急制动系统
    碰撞预警: collision_warning
    紧急制动: emergency_braking
    预计碰撞时间: TTC
    检验检测机构: testing_and_inspection_body
    车辆制造商: vehicle_manufacturer
  units:
    canonical:
      speed: km/h
      acceleration: m/s^2
      time: s
      distance: m
      temperature: degC
      illuminance: lx
      percentage: "%"
      angle: deg
    rule: 保留原始表达 raw_value，同时写入 canonical unit；不得丢失单边或双边公差。
  numeric_expressions:
    - "10 km/h～80 km/h -> lower_bound: 10, upper_bound: 80, unit: km/h"
    - "不小于4 s -> operator: GTE, value: 4, unit: s"
    - "(4±0.5) m/s² -> value: 4, tolerance_lower: 0.5, tolerance_upper: 0.5, unit: m/s^2"
    - "40_{-2}^{0} km/h -> value: 40, tolerance_lower: 2, tolerance_upper: 0, unit: km/h"
  condition_identity:
    rule: >-
      速度、载荷、车辆类别、目标运动状态、场地/仿真方式任一不同，都视为不同的限定条件；
      不得只因指标名称相同而合并 Threshold。
  target_identity:
    rule: >-
      目标类别与目标运动状态分开：车辆目标是实体，静止/匀速/制动是场景或条件；
      儿童行人和成年行人不可合并，自行车横穿与对向静止自行车不可合并为同一场景。
  clause_identity:
    rule: 使用原始编号，例如 5.2.1、6.11.4、A.2.3.1、B.2.5.3；附录标识不可丢失。

extraction_rules:
  - 先建立 Standard 与 Clause 层级，再抽取条款内的领域实体和关系。
  - 每个 Requirement 只表达一个可独立判断的 SHALL 或 SHALL_NOT 语义；并列条件应拆分后共享限定条件。
  - 第5章产生 Requirement、Metric、Threshold；第6章产生 TestScenario、Condition、Parameter 和 AcceptanceCriterion。
  - 使用 VERIFIED_BY 把第5章要求连接到第6章场景，不允许仅因编号相邻而推断连接。
  - 表1至表12的每个数据单元都必须保留车辆类别、场景、试验车辆速度、目标速度和载荷状态限定。
  - 表13至表20描述试验输入速度和公差，不能误标成性能通过阈值。
  - 6.11 的接受语义是“不发出碰撞预警且不进行紧急制动”，必须标为 false_response。
  - 5.3 的重复试验逻辑建为 AcceptanceCriterion，保留首次两次、必要时第三次及 90%/80% 通过率。
  - 系统关闭、部分关闭、不可用和故障是不同 SystemState；警告关闭与制动关闭不可合并。
  - 驾驶员踩制动踏板只有在规定减速度关系下才能中断紧急制动，该关系应作为 Condition。
  - 功能安全的“功能异常表现”用 FailureMode，“整车危害”用 Hazard，禁止把两者合并。
  - ASIL 属于 Hazard 与 SafetyGoal 链路；QM 仍建 ASILLevel，不当作缺失值。
  - 附录A的提交文档与备查文档均建 DocumentationArtifact，并记录 submission_status。
  - 仿真仅可覆盖 6.5～6.10；工具链先经过 B.2 可信度评估和确认，再由试验场景 USES_TOOLCHAIN。
  - 仿真与场地结果不一致导致第三次试验必须为场地试验，应建 AcceptanceCriterion 而非一般描述。
  - 第9章的实施时间是相对本文件实施日的月偏移；同时可计算 absolute_start_date，但保留原始偏移。
  - 只从原文建立关系；若只能根据领域常识推断，跳过该边并记录待人工补充。

threshold_rules:
  operators: [EQ, NEQ, GT, GTE, LT, LTE, BETWEEN, APPROX, NO_EVENT]
  required_context_fields:
    - source_clause
    - metric
    - operator
    - raw_value
  qualifier_fields:
    - vehicle_category
    - vehicle_load_state
    - test_scenario
    - ego_speed
    - target_speed
    - target_motion_state
    - system_function_state
    - execution_mode
  forbidden_patterns:
    - 无指标关联的纯数字节点
    - 将表号或图号当作 Threshold 名称
    - 合并来自不同条款但数值相同的阈值

evidence_policy:
  minimum_locator: [source_file, source_clause, evidence_text]
  preferred_locator: [source_file, source_clause, source_table, source_line_start, source_line_end]
  page_policy: >-
    当前 OCR Markdown 没有可靠的 page:N 标记，因此不得伪造页码；现阶段以条款、表号和行号追溯，
    后续若补充 PDF 页映射，再增加 source_page。
  quote_policy: evidence_text 保留足以证明实体或关系的最短原文，不复制整段无关内容。

source_quality_notes:
  - OCR 中上下公差存在多种 LaTeX 形式，抽取时必须同时保存 raw_value。
  - 6.3.1 标题出现在 6.3 总标题之前属于 OCR 标题顺序问题，应按语义恢复为 6.3 下级条款。
  - A.2.5.6 的列表字母在 OCR 中出现 b、a、c、d 顺序，不据此改变原要求语义。
  - 表 A.2 存在 rowspan/空列造成的行列错位，故障类型、试验工况和接受准则需人工抽样复核。
  - 规范性引用未注明年份时不得根据外部知识补齐版本。

manual_review_triggers:
  - 任何包含上下标公差但无法可靠解析为数值的表达式
  - 表1至表20任一行缺少车辆类别、载荷或速度限定
  - 表A.2中故障类型、危害、试验工况与接受准则无法一一对齐
  - 同一 canonical_id 出现互相冲突的定义或阈值
  - evidence_text 不含关系两端任一实体的明确语义证据
  - 模型尝试补充标准原文未出现的 ASIL、阈值或试验条件

lightrag_integration:
  entity_types_csv: >-
    Standard,Clause,Term,Organization,VehicleCategory,System,SystemFunction,SystemState,
    SystemComponent,Signal,DriverAction,Requirement,ImplementationRule,TypeEquivalenceCriterion,
    TestScenario,TestTarget,LoadState,Condition,Parameter,Metric,Threshold,AcceptanceCriterion,
    DocumentationArtifact,FailureMode,Hazard,ASILLevel,SafetyGoal,SafetyMeasure,SafetyAnalysis,
    VerificationActivity,SimulationToolchain,SimulationModel,ValidityDomain,CredibilityCriterion
  current_storage_behavior:
    neo4j_node_label: workspace label
    neo4j_edge_type: DIRECTED
    note: >-
      LightRAG 原生 Neo4j 存储不会按本 Schema 自动创建不同的 Neo4j relationship type；
      定制后处理应把 relation_type 写入边属性，并校验 source/target 类型。
  recommended_pipeline:
    - 按 extraction_profiles 分段抽取，避免一次提示包含全部 34 种实体造成类型漂移。
    - 实体写入前执行 canonical_id 与 alias 归一化。
    - 关系写入前校验 relation_definitions 的 source/target 白名单。
    - 数值写入前执行 unit、公差和 qualifiers 完整性检查。
    - 对 needs_review=true 的记录只进入待审区，不直接作为问答中的确定事实。

grounded_examples:
  - id: applicability_m1
    source: GB39901-2025::Standard::GB_39901-2025
    relation: APPLIES_TO
    target: GB39901-2025::VehicleCategory::M1
    evidence:
      source_clause: "1"
      text: 本文件适用于 M1 和 N1 类汽车。
  - id: supersedes_previous_version
    source: GB39901-2025::Standard::GB_39901-2025
    relation: SUPERSEDES
    target: GB39901-2025::Standard::GB_T_39901-2021
    evidence:
      source_clause: 前言
      text: 本文件代替 GB/T 39901—2021。
  - id: aeb_has_active_state
    source: GB39901-2025::System::AEBS
    relation: HAS_STATE
    target: GB39901-2025::SystemState::active
    evidence:
      source_clause: "3.4"
      text: 系统执行碰撞预警和/或紧急制动的状态。
  - id: collision_warning_timing
    semantic_path:
      - "Clause 5.1.1 SPECIFIES Requirement 车辆目标碰撞预警提前量"
      - "Requirement MEASURED_BY Metric warning_lead_time"
      - "Requirement HAS_THRESHOLD Threshold GTE 0.8 s"
      - "Requirement VERIFIED_BY TestScenario 6.5/6.6/6.7"
  - id: maximum_deceleration
    semantic_path:
      - "Clause 5.2.1 SPECIFIES Requirement 车辆目标紧急制动最大减速度"
      - "Requirement MEASURED_BY Metric maximum_deceleration_magnitude"
      - "Requirement HAS_THRESHOLD Threshold GTE 5.0 m/s^2"
    evidence:
      source_clause: "5.2.1"
      text: 试验过程中最大减速度绝对值应不小于 5.0 m/s²。
  - id: stationary_vehicle_test
    semantic_path:
      - "TestScenario 6.5 USES_TARGET passenger_vehicle_target"
      - "TestScenario 6.5 HAS_CONDITION TTC GTE 4 s"
      - "TestScenario 6.5 HAS_CONDITION centerline_offset LTE 0.2 m"
      - "TestScenario 6.5 HAS_LOAD_STATE driving_mass/maximum_design_total_mass"
  - id: false_response_no_event
    semantic_path:
      - "Clause 5.4 SPECIFIES Requirement 误响应禁止"
      - "Requirement VERIFIED_BY TestScenario 6.11.1-6.11.5"
      - "TestScenario HAS_ACCEPTANCE_CRITERION no_collision_warning_and_no_emergency_braking"
  - id: hazard_asil_goal
    semantic_path:
      - "FailureMode 非预期激活 CAUSES Hazard 非预期的减速"
      - "Hazard 非预期的减速 ASSIGNED_ASIL ASILLevel C"
      - "Hazard 非预期的减速 HAS_SAFETY_GOAL 避免非预期激活导致过大制动力"
      - "SafetyGoal IMPLEMENTED_BY SafetyMeasure"
    evidence:
      source_clause: A.2.3.1
      source_table: 表 A.1
  - id: simulation_credibility
    semantic_path:
      - "SimulationToolchain EVALUATED_BY CredibilityCriterion capability/accuracy/correctness/applicability/usability"
      - "SimulationToolchain HAS_VALIDITY_DOMAIN ValidityDomain"
      - "SimulationToolchain COMPOSED_OF SimulationModel vehicle_dynamics/sensor/system_control/environment/scenario/target"
      - "CredibilityCriterion USES_KPI Metric TTC/relative_collision_speed"
    evidence:
      source_clause: B.2
  - id: implementation_offset
    semantic_path:
      - "Standard HAS_IMPLEMENTATION_RULE ImplementationRule 9.1"
      - "ImplementationRule APPLIES_TO VehicleCategory M1/multipurpose_truck"
      - "ImplementationRule feature_scope=moped_related_requirements, start_offset_months=25"

competency_questions:
  - question: GB 39901-2025 适用于哪些车辆类别，并替代了哪个标准？
    expected_path: Standard -> APPLIES_TO/SUPERSEDES
  - question: M1 与 N1 面向车辆目标的系统工作速度范围有何不同？
    expected_path: VehicleCategory <- APPLIES_TO - Requirement -> HAS_CONDITION -> Threshold
  - question: 静止、匀速和制动车辆目标分别由哪些试验条款验证？
    expected_path: Requirement -> VERIFIED_BY -> TestScenario -> USES_TARGET
  - question: 某一碰撞场景在不同车辆类别、速度和载荷下允许的最大相对碰撞速度是多少？
    expected_path: TestScenario <- VERIFIED_BY - Requirement -> MEASURED_BY/HAS_THRESHOLD with qualifiers
  - question: 误响应试验有哪些，合格时系统应出现什么行为？
    expected_path: Requirement -> VERIFIED_BY -> TestScenario -> HAS_ACCEPTANCE_CRITERION
  - question: 关闭碰撞预警后，紧急制动功能还需满足什么要求？
    expected_path: SystemState <- HAS_CONDITION - Requirement -> VERIFIED_BY -> TestScenario 6.12
  - question: 附录A中“非预期的减速”对应什么 ASIL、安全目标和安全度量？
    expected_path: Hazard -> ASSIGNED_ASIL/HAS_SAFETY_GOAL/MEASURED_BY
  - question: 摄像头遮挡或通信接口故障如何验证，接受准则是什么？
    expected_path: SystemComponent -> HAS_FAILURE_MODE -> FailureMode <- INJECTS_FAULT - VerificationActivity -> HAS_ACCEPTANCE_CRITERION
  - question: 哪些场地试验可被仿真替代，工具链需要满足哪些可信度要求？
    expected_path: TestScenario -> USES_TOOLCHAIN -> SimulationToolchain -> EVALUATED_BY
  - question: 同一型式判定分别关注系统、车辆、制动系统和功能安全描述的哪些变化？
    expected_path: Standard -> HAS_EQUIVALENCE_CRITERION -> TypeEquivalenceCriterion
  - question: 不同车辆类别和型式批准状态从何时开始执行踏板式两轮摩托车相关要求？
    expected_path: Standard -> HAS_IMPLEMENTATION_RULE -> ImplementationRule -> APPLIES_TO
  - question: 产品使用说明书和功能安全资料分别必须包含哪些内容？
    expected_path: Clause -> REQUIRES_DOCUMENT -> DocumentationArtifact

acceptance_checks:
  schema:
    - entity_types 与 relation_definitions 中出现的类型完全一致。
    - relations_of_interest 与 relation_definitions 的键完全一致。
    - 所有实体都有 canonical_id、name、source_file、source_clause 和 evidence_text；种子实体例外。
  graph:
    - 不存在 Table、Figure、Other 等兜底实体类型。
    - 不存在无 Metric 或 Condition 上下文的 Threshold。
    - 第5章每个性能 Requirement 至少有一个 VERIFIED_BY 关系。
    - 第6.5至6.10场景同时具备 TestTarget、Condition、LoadState 和 AcceptanceCriterion。
    - 第6.11的五个误响应场景均标为 false_response。
    - 表A.1每个 Hazard 均连接 ASILLevel 与 SafetyGoal。
    - 仿真工具链同时连接 ValidityDomain、CredibilityCriterion 和 DocumentationArtifact。
    - 每条边都含 relation_type、source_clause 和 evidence_text。

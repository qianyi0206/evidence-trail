name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            harness/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ./harness

      - name: Run unit tests
        run: |
          python -m unittest discover -s harness/tests
          python -m unittest discover -s benchmark/tests

      - name: Compile Python sources
        env:
          PYTHONPYCACHEPREFIX: /tmp/evidence-trail-pycache
        run: python -m compileall -q harness benchmark scripts apps lightrag_custom

  offline-validation:
    name: Offline validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            harness/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ./harness

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Validate schema guard
        run: python scripts/test_schema_guard.py

      - name: Validate structural corpus
        env:
          AEB_PROFILE_ENV: .env.gb39901_v4
        run: python scripts/test_structural_chunks.py

      - name: Validate benchmark artifacts
        run: python benchmark/scripts/validate_benchmark.py

      - name: Validate Docker Compose configuration
        run: |
          docker compose \
            --env-file .env \
            --env-file .env.gb39901_v4 \
            -f compose.yaml \
            -f compose.lightrag-app.yaml \
            config --quiet
